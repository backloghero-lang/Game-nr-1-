<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Wojfer 67 - Salon Nocą</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Courier New", monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex; align-items: center; justify-content: center;
    }
    #gameCanvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #0a0608;
      display: block;
    }
    /* nakladka sterowania dotykowego */
    #touch {
      position: fixed; inset: 0;
      pointer-events: none;
      display: none;
      z-index: 10;
    }
    #touch button {
      position: absolute;
      pointer-events: auto;
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,179,71,0.7);
      background: rgba(20,12,8,0.55);
      color: #ffb347;
      font-size: 32px;
      font-weight: bold;
      font-family: monospace;
      box-shadow: 0 0 12px rgba(255,120,40,0.4);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #touch button:active { background: rgba(255,179,71,0.4); transform: scale(0.92); }
    #btn-left  { left: 24px;  bottom: 24px; }
    #btn-right { left: 130px; bottom: 24px; }
    #btn-jump  { right: 24px; bottom: 24px; width: 100px; height: 100px; font-size: 38px; }
    #btn-throw { right: 140px; bottom: 24px; width: 80px; height: 80px; font-size: 28px; color: #c8c8d0; border-color: rgba(200,200,210,0.7); }
    #btn-restart {
      right: 24px; top: 24px;
      width: 50px; height: 50px;
      font-size: 18px;
    }
    /* pokaz tylko na urzadzeniach dotykowych lub waskich ekranach */
    @media (hover: none) and (pointer: coarse), (max-width: 900px) {
      #touch { display: block; }
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="touch">
  <button id="btn-left">◀</button>
  <button id="btn-right">▶</button>
  <button id="btn-jump">▲</button>
  <button id="btn-throw">✪</button>
  <button id="btn-restart">R</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 480;

// ===== ASSETS =====
const ASSETS = {
  player_idle: "img/player_idle.png",
  player_run:  "img/player_run.png",
  player_jump: "img/player_jump.png",
  player_fall: "img/player_fall.png",
  brick:       "img/brick.png",
  coin:        "img/coin.png",
  heart:       "img/heart.png",
  crab:        "img/crab.png",
  rat:         "img/rat.png",
  barrel:      "img/barrel.png",
  ninja:       "img/ninja.png",
  spikes:      "img/spikes.png",
  qblock:      "img/qblock.png",
  crate:       "img/crate.png",
  door:        "img/door.png",
  window_:     "img/window.png",
  lamp:        "img/lamp.png",
  poster:      "img/poster.png",
  boxes2:      "img/boxes2.png",
  boxes3:      "img/boxes3.png",
  couch:       "img/couch.png",
  coatrack:    "img/coatrack.png",
  plant:       "img/plant.png",
  pot:         "img/pot.png",
  lift_low:    "img/lift_press_low.png",
  lift_mid:    "img/lift_press_mid.png",
  lift_high:   "img/lift_press_high.png",
  lift_strain: "img/lift_strain.png"
};
const images = {};
function loadAssets(cb) {
  const keys = Object.keys(ASSETS);
  let left = keys.length;
  for (const k of keys) {
    const img = new Image();
    img.onload  = () => { images[k] = img; if (--left === 0) cb(); };
    img.onerror = () => { console.warn("brak", ASSETS[k]); if (--left === 0) cb(); };
    img.src = ASSETS[k];
  }
}

// ===== TILEMAP =====
// . puste, # cegla, c skrzynka, q ?-blok, S kolce
// C moneta, K krab, R szczur, B beczka, N ninja
// F drzwi (meta - otwierane po pokonaniu bossa), P start, Z boss kanapa
// dekoracje: w okno, l lampa, o plakat HELP, x kartonyx2, y kartonyx3, t wieszak, p doniczka
const TILE = 40;
const MAP = [
  "..................................................................................................................................",
  "..................................................................................................................................",
  "..................................................................................................................................",
  "..................................................................................................................................",
  ".......w........................w...........................w......................................w..............................",
  "..................................................................................................................................",
  ".................###..................c#####c......###...................q####q.....................###...........................",
  "..................................q...............................................................................................",
  ".........C.................C.....C.C.C..............C.C.C..C..C..C............C.C.C......C.C.C....................C.C.C...........",
  ".......####.......##.....####.........##....####..S....####.......##....S....####.....##.....S####.......##.S.S####....##....F....",
  "......................................................##................................................................##.##.....",
  "....P....r...x...r....p....y....r.....p.....x.....r.....y.....p.....r.....x.....p.....r.....y.....r.....p.....x......Z...........#",
  "..............K............R..........K.........N.........B.....K..........R.........N........K..........B.........N..............",
  "########.....##############.######.##############.####.##.##############.##############.##############.###########################",
  "########.....##############.######.##############.####.##.##############.##############.##############.###########################"
];

const worldWidth  = MAP[0].length * TILE;
const worldHeight = MAP.length * TILE;

let player, coins, enemies, hazards, decor, flag, solids, score, lives, won, dead, boss;
let projectiles = [];

const BOSS_HP = 3; // ile razy podniesc

function buildLevel() {
  solids = []; coins = []; enemies = []; hazards = []; decor = []; flag = null; boss = null;
  for (let r = 0; r < MAP.length; r++) {
    for (let c = 0; c < MAP[r].length; c++) {
      const ch = MAP[r][c];
      const x = c * TILE, y = r * TILE;
      switch (ch) {
        case "#": {
          // top tile = brak # bezposrednio nad nim
          const above = r > 0 ? MAP[r - 1][c] : ".";
          solids.push({ x, y, w: TILE, h: TILE, kind: "brick", topTile: above !== "#" });
          break;
        }
        case "c": solids.push({ x, y, w: TILE, h: TILE, kind: "crate" }); break;
        case "q": solids.push({ x, y, w: TILE, h: TILE, kind: "qblock", hit: false, heartTaken: false, heartT: 0 }); break;
        case "S": hazards.push({ x: x + 4, y: y + TILE - 12, w: TILE - 8, h: 12, kind: "spikes" });
                  decor.push({ x: x, y: y + TILE - 18, kind: "spikes" }); break;
        case "C": coins.push({ x: x + 12, y: y + 12, w: 16, h: 16, taken: false, t: 0 }); break;
        case "K": enemies.push(makeEnemy(x, y, "crab",   34, 22, -1.2)); break;
        case "R": enemies.push(makeEnemy(x, y, "rat",    34, 28, -1.5)); break;
        case "B": enemies.push(makeEnemy(x, y, "barrel", 34, 30, -1.0)); break;
        case "N": enemies.push(makeEnemy(x, y, "ninja",  30, 38, -1.8)); break;
        case "F": flag = { x, y: y - TILE, w: TILE, h: TILE * 2 }; break;
        case "P": player = makePlayer(x, y); break;
        case "w": decor.push({ x, y, kind: "window" }); break;
        case "l": decor.push({ x, y, kind: "lamp" }); break;
        case "o": decor.push({ x, y, kind: "poster" }); break;
        case "p": decor.push({ x, y, kind: "pot" }); break;
        case "x": decor.push({ x, y, kind: "boxes2" }); break;
        case "y": decor.push({ x, y, kind: "boxes3" }); break;
        case "t": decor.push({ x, y, kind: "coatrack" }); break;
        case "r": decor.push({ x, y, kind: "radiator", weapon: true, available: true }); break;
        case "Z": boss = { x: x - 50, y: y - 32, w: 170, h: 100, hp: BOSS_HP, alive: true,
                            t: 0, hitFlash: 0, baseY: y - 32, cooldown: 0, liftPhase: 0 }; break;
      }
    }
  }
}

function makePlayer(x, y) {
  return { x: x + 4, y: y - 8, w: 28, h: 44, vx: 0, vy: 0,
           speed: 4, jump: -12, grounded: false, dir: 1, walk: 0, state: "idle",
           jumpsLeft: 2, jumpHeld: false, weapon: 0, throwHeld: false };
}

function makeEnemy(x, y, kind, w, h, vx) {
  return { x, y: y + (TILE - h), w, h, vx, vy: 0, alive: true, kind, t: 0 };
}

const gravity = 0.6;
const camera = { x: 0, y: 0 };

const keys = {};
document.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (e.code === "KeyR") resetGame();
});
document.addEventListener("keyup", e => keys[e.code] = false);

// ===== AUDIO =====
const Audio = (() => {
  let actx;
  function ensure() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
  function beep(freq, dur, type = "square", vol = 0.05) {
    try {
      ensure();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(actx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
      o.stop(actx.currentTime + dur);
    } catch (e) {}
  }
  return {
    jump:  () => beep(380, 0.10, "square"),
    coin:  () => beep(880, 0.08, "triangle", 0.07),
    stomp: () => beep(140, 0.18, "sawtooth"),
    die:   () => beep(90,  0.5,  "sawtooth", 0.08),
    win:   () => { beep(660, 0.15); setTimeout(() => beep(880, 0.25), 150); }
  };
})();

function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function hasGroundAhead(e) {
  const checkX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2;
  const checkY = e.y + e.h + 4;
  for (const s of solids) {
    if (checkX >= s.x && checkX < s.x + s.w &&
        checkY >= s.y && checkY < s.y + s.h) return true;
  }
  return false;
}

function moveAndCollide(e) {
  e.grounded = false;
  e.x += e.vx;
  // odbicie od krawedzi swiata
  if (e.bounceOnWall) {
    if (e.x < 0) { e.x = 0; e.vx = -e.vx; }
    else if (e.x + e.w > worldWidth) { e.x = worldWidth - e.w; e.vx = -e.vx; }
  }
  for (const s of solids) {
    if (aabb(e, s)) {
      if (e.vx > 0) e.x = s.x - e.w;
      else if (e.vx < 0) e.x = s.x + s.w;
      if (e.bounceOnWall) e.vx = -e.vx;
    }
  }
  e.y += e.vy;
  for (const s of solids) {
    if (aabb(e, s)) {
      if (e.vy > 0) { e.y = s.y - e.h; e.vy = 0; e.grounded = true; }
      else if (e.vy < 0) {
        e.y = s.y + s.h; e.vy = 0;
        // ?-blok uderzony od dolu przez gracza
        if (e === player && s.kind === "qblock" && !s.hit) {
          s.hit = true;
          s.heartT = 30; // tyle klatek serce skacze nad blokiem
          Audio.coin();
          score += 50;
        }
      }
    }
  }
}

let tick = 0;
function update() {
  tick++;
  if (won || dead) return;

  if (player.state === "lift") {
    player.vx = 0;
  } else if (keys["ArrowLeft"])       { player.vx = -player.speed; player.dir = -1; }
  else if (keys["ArrowRight"]) { player.vx =  player.speed; player.dir =  1; }
  else player.vx = 0;

  const jumpKey = keys["Space"] || keys["ArrowUp"];
  if (player.state === "lift") {
    // brak skoku w trakcie wyciskania
  } else if (jumpKey && !player.jumpHeld && player.jumpsLeft > 0) {
    player.vy = player.jumpsLeft === 2 ? player.jump : player.jump * 0.85;
    player.grounded = false;
    player.jumpsLeft--;
    Audio.jump();
  }
  player.jumpHeld = jumpKey;

  if (player.state !== "lift") {
    player.vy += gravity;
    if (player.vy > 16) player.vy = 16;
    moveAndCollide(player);
  }

  // reset podwojnego skoku gdy na ziemi
  if (player.grounded) player.jumpsLeft = 2;

  // stan animacji (nie zmieniaj jesli wycisk)
  if (player.state !== "lift") {
    if (!player.grounded) player.state = player.vy < 0 ? "jump" : "fall";
    else if (Math.abs(player.vx) > 0.1) { player.state = "run"; player.walk += 0.18; }
    else player.state = "idle";
  }

  if (player.x < 0) player.x = 0;
  if (player.x + player.w > worldWidth) player.x = worldWidth - player.w;
  if (player.y > worldHeight) die();

  // wrogowie
  for (const en of enemies) {
    if (!en.alive) continue;
    en.t += 0.15;
    en.vy += gravity;
    if (en.vy > 12) en.vy = 12;
    en.bounceOnWall = true;
    moveAndCollide(en);
    en.bounceOnWall = false;
    // odbicie od krawedzi przepasci
    if (en.grounded && !hasGroundAhead(en)) en.vx = -en.vx;

    if (aabb(player, en)) {
      if (player.vy > 0 && player.y + player.h - en.y < 22) {
        en.alive = false;
        player.vy = -9;
        score += 100;
        Audio.stomp();
      } else {
        die();
      }
    }
  }

  // kolce / pulapki
  for (const h of hazards) {
    if (aabb(player, h)) die();
  }

  // zbieranie grzejnikow
  for (const d of decor) {
    if (d.kind !== "radiator" || d.available === false) continue;
    if (aabb(player, { x: d.x + 6, y: d.y + TILE * 2 - 44, w: 28, h: 44 })) {
      d.available = false;
      player.weapon++;
      Audio.coin();
    }
  }

  // rzut grzejnika
  const throwKey = keys["KeyX"] || keys["KeyZ"] || keys["throwBtn"];
  if (throwKey && !player.throwHeld && player.state !== "lift") throwWeapon();
  player.throwHeld = throwKey;

  // pociski
  for (const p of projectiles) {
    if (!p.alive) continue;
    p.age++;
    p.vy += gravity * 0.5;
    if (p.vy > 12) p.vy = 12;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += 0.4 * (p.vx > 0 ? 1 : -1);
    const box = { x: p.x, y: p.y, w: 24, h: 16 };
    // wrogowie
    for (const en of enemies) {
      if (!en.alive) continue;
      if (aabb(box, en)) {
        en.alive = false;
        p.alive = false;
        score += 150;
        Audio.stomp();
        break;
      }
    }
    if (!p.alive) continue;
    // sciany
    for (const s of solids) {
      if (aabb(box, s)) { p.alive = false; break; }
    }
    if (p.age > 180 || p.x < -50 || p.x > worldWidth + 50 || p.y > worldHeight) p.alive = false;
  }
  projectiles = projectiles.filter(p => p.alive);

  // serca z ?-blokow
  for (const s of solids) {
    if (s.kind !== "qblock" || !s.hit || s.heartTaken) continue;
    if (s.heartT > 0) s.heartT--;
    // serce siedzi na blocku - mozna podniesc
    const heartBox = { x: s.x + 6, y: s.y - 26, w: s.w - 12, h: 26 };
    if (aabb(player, heartBox)) {
      s.heartTaken = true;
      if (lives < 5) lives++;
      score += 200;
      Audio.coin();
    }
  }

  // monety
  for (const c of coins) {
    if (!c.taken) {
      c.t += 0.12;
      if (aabb(player, c)) {
        c.taken = true;
        score += 50;
        Audio.coin();
      }
    }
  }

  // boss - wyciskanie jak hantle
  if (boss && boss.alive) {
    boss.t += 0.08;
    if (boss.cooldown > 0) boss.cooldown--;
    // start wyciskania - dotkniecie bossa (w skoku lub z boku) gdy nie na cooldownie
    if (player.state !== "lift" && boss.cooldown === 0 && aabb(player, boss)) {
      player.state = "lift";
      player.liftTime = 90;            // 1.5s
      player.vx = 0; player.vy = 0;
      player.grounded = true;
      // wyrownaj gracza pod boss
      player.x = boss.x + (boss.w - player.w) / 2;
      player.y = boss.baseY + boss.h - player.h + 4;
      Audio.jump();
    }
  }

  // animacja wyciskania
  if (player.state === "lift" && boss && boss.alive) {
    player.liftTime--;
    const t = 90 - player.liftTime;
    let lift = 0;
    if (t < 30)      lift = t / 30;            // pchanie w gore
    else if (t < 60) lift = 1 + Math.sin((t - 30) * 0.4) * 0.05; // trzymanie z dygotem
    else             lift = (90 - t) / 30;     // opuszczanie
    boss.y = boss.baseY - 55 * lift;
    boss.liftPhase = lift;
    if (player.liftTime <= 0) {
      boss.y = boss.baseY;
      boss.liftPhase = 0;
      boss.hp--;
      boss.hitFlash = 20;
      score += 300;
      Audio.stomp();
      boss.cooldown = 30; // pol sekundy zanim mozna znow
      player.state = "idle";
      player.vy = -6; // maly odskok
      if (boss.hp <= 0) { boss.alive = false; Audio.win(); }
    }
  }

  // drzwi otwarte tylko gdy boss pokonany
  if (flag && aabb(player, flag) && (!boss || !boss.alive)) {
    won = true;
    Audio.win();
  }

  camera.x = player.x + player.w / 2 - canvas.width / 2;
  camera.y = player.y + player.h / 2 - canvas.height / 2;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > worldWidth - canvas.width) camera.x = worldWidth - canvas.width;
  if (camera.y < 0) camera.y = 0;
  if (camera.y > worldHeight - canvas.height) camera.y = worldHeight - canvas.height;
}

function die() {
  if (dead) return;
  dead = true;
  lives--;
  Audio.die();
  setTimeout(() => {
    if (lives <= 0) resetGame();
    else respawn();
  }, 800);
}
function respawn() {
  for (let r = 0; r < MAP.length; r++)
    for (let c = 0; c < MAP[r].length; c++)
      if (MAP[r][c] === "P") player = makePlayer(c * TILE, r * TILE);
  dead = false;
}
function resetGame() {
  score = 0; lives = 3; won = false; dead = false;
  projectiles = [];
  buildLevel();
}

function throwWeapon() {
  if (!player || player.weapon <= 0) return;
  player.weapon--;
  projectiles.push({
    x: player.x + (player.dir > 0 ? player.w : -16),
    y: player.y + 12,
    vx: player.dir * 9,
    vy: -3,
    rot: 0,
    age: 0,
    alive: true
  });
  Audio.stomp();
}

// ===== RYSOWANIE =====
function drawSprite(key, x, y, w, h, flipX = false) {
  const img = images[key];
  if (!img) { ctx.fillStyle = "#f0f"; ctx.fillRect(x, y, w, h); return; }
  if (flipX) {
    ctx.save();
    ctx.translate(x + w, y);
    ctx.scale(-1, 1);
    ctx.drawImage(img, 0, 0, w, h);
    ctx.restore();
  } else {
    ctx.drawImage(img, x, y, w, h);
  }
}

// === ELEMENTY POKOJU WOJFERA (proceduralne) ===
function drawBlueDoor(x, y, w, h) {
  // ciemna rama
  ctx.fillStyle = "#3a2410";
  ctx.fillRect(x - 4, y - 4, w + 8, h + 4);
  // niebieskie drzwi
  ctx.fillStyle = "#4a82b4";
  ctx.fillRect(x, y, w, h);
  // jasniejszy panel boczny (cienie)
  ctx.fillStyle = "#5d92c4";
  ctx.fillRect(x + 4, y + 6, w - 8, 4);
  // panele
  ctx.fillStyle = "#3a6a98";
  ctx.fillRect(x + 8, y + 16, w - 16, h * 0.35);
  ctx.fillRect(x + 8, y + 20 + h * 0.35, w - 16, h * 0.55);
  // ramy paneli (jasne)
  ctx.strokeStyle = "#6ea8d8";
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 8, y + 16, w - 16, h * 0.35);
  ctx.strokeRect(x + 8, y + 20 + h * 0.35, w - 16, h * 0.55);
  // klamka
  ctx.fillStyle = "#d4a020";
  ctx.beginPath();
  ctx.arc(x + 10, y + h / 2, 3, 0, Math.PI * 2);
  ctx.fill();
}

f
